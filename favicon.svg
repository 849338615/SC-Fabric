<svg width="256" height="256" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid background for app icon style -->
  <rect width="100" height="100" rx="20" fill="#0b0e14" />
  
  <g stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Connections -->
    <line x1="25" y1="25" x2="25" y2="50" />
    <line x1="50" y1="25" x2="75" y2="50" />
    <line x1="25" y1="50" x2="50" y2="75" />
    <line x1="50" y1="75" x2="75" y2="75" />
    
    <!-- Nodes (using background color as fill to mask the lines) -->
    <circle cx="25" cy="25" r="9" fill="#0b0e14" />
    <circle cx="50" cy="25" r="9" fill="#0b0e14" />
    <circle cx="75" cy="25" r="9" fill="#0b0e14" />
    
    <circle cx="25" cy="50" r="9" fill="#0b0e14" />
    <circle cx="50" cy="50" r="9" fill="#0b0e14" />
    <circle cx="75" cy="50" r="9" fill="#0b0e14" />
    
    <circle cx="25" cy="75" r="9" fill="#0b0e14" />
    <circle cx="50" cy="75" r="9" fill="#0b0e14" />
    <circle cx="75" cy="75" r="9" fill="#0b0e14" />
  </g>
</svg>
